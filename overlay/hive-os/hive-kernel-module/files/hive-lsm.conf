# HIVE Linux Security Module (LSM) Configuration
# Pluggable security at the kernel level

[LSM_HOOKS]
# File system operations
fs_permission_hook = enabled
fs_open_hook = enabled
fs_create_hook = enabled
fs_unlink_hook = enabled
fs_rename_hook = enabled

# Process operations
process_fork_hook = enabled
process_exec_hook = enabled
process_exit_hook = enabled

# Capability enforcement
capability_hook = enabled

# Network operations
network_connect_hook = enabled
network_bind_hook = enabled
network_send_hook = enabled
network_recv_hook = enabled

# Signal delivery
signal_hook = enabled

[PERSONALITY_CHECKS]
# Deny operations based on personality traits
denial_on_insufficient_authority = true
denial_on_insufficient_vigilance = true
denial_on_insufficient_diligence = true

# Log all personality-based denials
audit_personality_denials = true
audit_level = INFO  # DEBUG, INFO, WARNING, ERROR

[ROLE_ENFORCEMENT]
# Enforce role-based access control at kernel level
enforce_rbac = true

# Role-to-capability mapping
role_check_on_capability = true
role_check_on_file_access = true
role_check_on_process_operation = true

[COLLECTIVE_KERNEL_STATE]
# Share kernel-level events with collective
enable_event_sharing = true

# Events to share
share_security_events = true
share_process_events = true
share_network_events = true
share_file_events = true

# Maximum event queue size
max_pending_events = 10000

[THREAT_RESPONSE]
# Automatic response to detected threats
auto_response_enabled = true

# Increase vigilance on threat detection
auto_vigilance_boost = 0.20

# Auto-isolate compromised processes
auto_isolate_threats = true

# Auto-alert architect
auto_alert_architect = true
alert_threshold = CRITICAL
