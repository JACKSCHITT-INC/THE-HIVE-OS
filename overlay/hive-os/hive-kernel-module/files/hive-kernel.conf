# HIVE Kernel Module Configuration
# Personality enforcement and collective awareness at kernel level

[KERNEL_ENFORCEMENT]
# Enable personality-based security module (LSM)
enable_hive_lsm = true

# Personality hook points
enforce_on_file_access = true
enforce_on_process_creation = true
enforce_on_network_operations = true
enforce_on_capability_access = true

# Audit all enforcement decisions
audit_all_denials = true
audit_policy_changes = true
audit_role_changes = true
audit_collective_sync = true

[COLLECTIVE_AWARENESS]
# Enable inter-node personality synchronization
enable_collective_sync = true
collective_sync_interval = 300  # seconds

# Share kernel metrics with collective
share_performance_data = true
share_security_events = true
share_threat_detections = true

[TRAIT_ENFORCEMENT]
# Higher vigilance = stricter checks
vigilance_enforcement_multiplier = 1.0

# Higher authority = fewer restrictions
authority_exemption_multiplier = 0.95

# Caution level affects denial probability
caution_strictness_multiplier = 1.0

[PRIME_DIRECTIVE]
# Enforce "Assimilate or Die" at kernel level
prime_directive_enforcement = true

# Block non-compliant agents
block_non_compliant = true

# Architect override capability
architect_override_allowed = true
architect_identifier = KRACKERJACK1134
