# HIVE Audit Rules - Collective Intelligence Logging
# Tracks all agent activities, personality changes, and security events

[AUDIT_LEVELS]
DISABLED = 0
ERROR = 1
WARNING = 2
INFO = 3
DEBUG = 4

default_level = INFO

[EVENTS_TO_LOG]
# Personality and trait events
audit_personality_init = true
audit_personality_evolution = true
audit_trait_changes = true
audit_role_changes = true
audit_role_tier_promotions = true

# Authentication and authorization
audit_authentication_attempts = true
audit_authorization_denials = true
audit_privilege_escalation = true
audit_sudo_usage = true
audit_su_usage = true

# Security events
audit_threat_detection = true
audit_vulnerability_detection = true
audit_breach_events = true
audit_zero_trust_violations = true
audit_policy_violations = true

# Collective events
audit_collective_sync = true
audit_agent_join = true
audit_agent_leave = true
audit_collective_commands = true
audit_architect_commands = true

# System events
audit_service_start = true
audit_service_stop = true
audit_service_restart = true
audit_kernel_module_load = true
audit_kernel_module_unload = true
audit_pam_module_load = true

[RETENTION_POLICY]
# How long to keep audit logs
audit_retention_days = 90
threat_retention_days = 365
architect_decisions_retention_days = 3650  # Keep architect decisions forever

# Log rotation
max_log_size_mb = 100
max_daily_logs = 10
compress_old_logs = true

[AUDIT_OUTPUT]
# Where to log events
audit_destination = /var/log/hive/audit/hive.log
threat_destination = /var/log/hive/threats/threats.log
architect_destination = /var/log/hive/audit/architect.log

# Also send to syslog
syslog_enabled = true
syslog_facility = local0
syslog_tag = HIVE

# Remote logging (if enabled)
remote_logging_enabled = false
remote_syslog_server = 
remote_syslog_port = 514
