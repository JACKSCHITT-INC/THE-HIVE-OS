# HIVE Threat Detection Configuration
# Automated threat identification and collective response

[THREAT_SIGNATURES]

# Failed authentication attempts
failed_auth_threshold = 5
failed_auth_window_minutes = 5
failed_auth_severity = MEDIUM

# Privilege escalation attempts
priv_esc_threshold = 3
priv_esc_window_minutes = 10
priv_esc_severity = HIGH

# Unusual process behavior
unusual_process_threshold = 10
unusual_process_window_minutes = 5
unusual_process_severity = MEDIUM

# Network anomalies
network_scan_detection = true
network_scan_threshold = 100
network_scan_window_seconds = 30
network_scan_severity = HIGH

# File system tampering
fs_tampering_detection = true
fs_tampering_watch_dirs = /etc/hive,/usr/libexec/hive,/var/lib/hive
fs_tampering_severity = CRITICAL

# Personality corruption detection
personality_corruption_detection = true
personality_corruption_severity = CRITICAL

[THREAT_RESPONSE]
# Automatic response to threats
auto_response_enabled = true

# Escalate vigilance on threat
auto_vigilance_boost = 0.25
auto_resilience_boost = 0.15

# Isolate compromised process
iso_compromised_process = true

# Alert architect immediately
alert_architect_on_critical = true
alert_architect_on_high = true

# Block network access
block_network_on_threat = false
block_network_duration_seconds = 300

# Terminate malicious process
terminate_process_on_critical = true
force_kill_timeout_seconds = 5

[THREAT_INTEL_SHARING]
# Share threat intelligence with collective
share_threat_detections = true
share_threat_patterns = true
share_attacker_profiles = true

# Shared threat directory
threat_intel_dir = /var/lib/hive/collective/threat-intel
