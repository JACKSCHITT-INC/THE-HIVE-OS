# HIVE Zero-Trust Security Rules
# ZORG-Ω (The Shadow) Enforcement

[IDENTITY_VERIFICATION]
# Every request must be authenticated
require_authentication = true
authentication_method = multi_factor  # PAM + personality verification

# Re-authenticate for sensitive operations
resensitive_ops_reauthenticate = true
resensitive_ops_timeout_minutes = 5

[ATTRIBUTE_VERIFICATION]
# Verify agent attributes
verify_node_type = true
verify_personality_state = true
verify_role_tier = true
verify_traits = true
verify_collective_membership = true

[POLICY_ENFORCEMENT]
# Enforce based on verified attributes
enforce_least_privilege = true
enforce_capability_restrictions = true
enforce_file_access_restrictions = true
enforce_network_access_restrictions = true
enforce_role_based_access = true

[CONTINUOUS_MONITORING]
# Monitor continuously
monitor_behavior = true
monitor_trait_consistency = true
monitor_role_adherence = true
monitor_access_patterns = true
monitor_network_traffic = true

# Detect deviations
deviation_threshold = 0.15  # 15% deviation triggers alert
deviation_action = RESTRICT_AND_ALERT

[ARCHITECT_OVERSIGHT]
# Architect has ultimate authority
architect_can_override = true
architect_override_requires_log = true
architect_id = KRACKERJACK1134

# All architect actions logged permanently
architect_action_log_retention = PERMANENT
