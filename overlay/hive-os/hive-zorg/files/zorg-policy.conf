# HIVE ZORG-Ω Policy Configuration
# The Shadow - Security Enforcement and Threat Hunting
# Author: ZORG_OMEGA - The Shadow

[CORE_POLICY]
# Trust nothing, verify everything
zero_trust_default = true

# Deny by default, allow by exception
default_posture = DENY

# All activities must be justified
require_justification = true

[THREAT_HUNTING]
# Active threat hunting parameters
hunting_enabled = true
hunting_interval_minutes = 15

# Suspicious patterns to watch
watch_process_spawning = true
watch_network_anomalies = true
watch_file_modifications = true
watch_privilege_escalation = true
watch_capability_usage = true

[VULNERABILITY_SCANNING]
# Automated vulnerability detection
vuln_scan_enabled = true
vuln_scan_interval_hours = 6

# Scanning targets
scan_installed_packages = true
scan_file_permissions = true
scan_network_services = true
scan_kernel_parameters = true
scan_pam_configuration = true

[AUDITING]
# Comprehensive auditing
audit_all_system_calls = false  # Too verbose, use sampling
audit_sensitive_files = true
audit_network_access = true
audit_authentication = true
audit_privilege_changes = true
audit_policy_violations = true

[INCIDENT_RESPONSE]
# Automated incident response
auto_incident_response = true

# Incident severity levels
incident_critical_auto_action = ISOLATE_AND_ALERT
incident_high_auto_action = ALERT_ARCHITECT
incident_medium_auto_action = LOG_AND_MONITOR
incident_low_auto_action = LOG

[QUARANTINE]
# Suspicious file/process handling
quarantine_suspicious_files = true
quarantine_directory = /var/lib/hive/zorg-state/quarantine
quarantine_retention_days = 30

quarantine_suspicious_processes = true
quarantine_timeout_seconds = 5
